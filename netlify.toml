[build]
  functions = "netlify/functions"
  publish = "build"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"

# === Development server configuration ===
[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  framework = "#custom"

# Scheduler is executed by Supabase Cron (scheduler-executor).
# Netlify scheduled execution is intentionally disabled to avoid double runs.
